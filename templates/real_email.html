<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ email.subject }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <a href="/game/inbox" class="btn btn-outline-secondary mb-3">← Back to Inbox</a>

    <p class="text-muted">Logged in as: <strong>{{ username }}</strong></p>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3>{{ email.subject }}</h3>
            <p><strong>From:</strong> {{ email.from }}</p>
            <p><strong>To:</strong> {{ email.to }}</p>
            <p><strong>Date:</strong> {{ email.date }}</p>
            <hr>
            <pre style="white-space: pre-wrap; font-family: inherit;">{{ email.body }}</pre>

            <hr>

            {% if existing_answer %}
                <div class="alert alert-info">
                    You already answered: <strong>{{ existing_answer }}</strong>
                </div>
                <a href="/game/result" class="btn btn-primary">View Result</a>
            {% else %}
                <form method="POST" action="/real/answer/{{ case_id }}">
                    <button type="submit" name="answer" value="phishing" class="btn btn-danger me-2">
                        Phishing
                    </button>
                    <button type="submit" name="answer" value="legitimate" class="btn btn-success">
                        Legitimate
                    </button>
                </form>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
